name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
     
      - name: Checkout repository
        uses: actions/checkout@v3

     
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

     
      - name: Make Maven wrapper executable
        run: |
          cd springboot/app
          chmod +x mvnw

    
      - name: Build Spring Boot JAR
        run: |
          cd springboot/app
          ./mvnw clean package -DskipTests

    
      - name: Build Spring Boot backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app

      
      - name: Build Angular frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

     
      - name: Push Spring Boot backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

    
      - name: Push Angular frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest

      
      - name: Test application with Docker Compose
        run: |
          docker compose -f docker-compose.yml up -d
          # wait for containers to start
          sleep 20
          docker ps