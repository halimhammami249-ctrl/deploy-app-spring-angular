name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Log in to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3️⃣ Build Spring Boot JAR
      - name: Build Spring Boot JAR
        run: |
          cd springboot/app
          ./mvnw clean package -DskipTests

      # 4️⃣ Build Spring Boot backend Docker image
      - name: Build Spring Boot backend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest ./springboot/app

      # 5️⃣ Build Angular frontend Docker image
      # ✅ Make sure Dockerfile is here: angular-app/Dockerfile
      - name: Build Angular frontend image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest ./angular-app

      # 6️⃣ Push backend image
      - name: Push Spring Boot backend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/spring-app:latest

      # 7️⃣ Push frontend image
      - name: Push Angular frontend image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/angular-app:latest